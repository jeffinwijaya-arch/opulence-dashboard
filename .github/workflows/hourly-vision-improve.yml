name: "Vision: Hourly improvement cycle"

# Runs an improvement agent every hour to enhance watch recognition.
# Scoped strictly to vision code — will NOT touch unrelated files.
#
# Kill switch: create .github/vision-agent/DISABLED
# Budget cap: 10-minute timeout per run
# Branch: all changes land on `vision-improvements` branch, never main

on:
  schedule:
    - cron: "30 */6 * * *"   # every 6 hours at :30 (reduced from hourly)
  workflow_dispatch:          # manual trigger for testing

concurrency:
  group: vision-improve
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  improve:
    name: Vision improvement cycle
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 5

      - name: Kill switch
        id: killswitch
        run: |
          if [ -f .github/vision-agent/DISABLED ]; then
            echo "disabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "disabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.killswitch.outputs.disabled != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        if: steps.killswitch.outputs.disabled != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        if: steps.killswitch.outputs.disabled != 'true'
        run: |
          pip install pytest anthropic
          npm install

      - name: Create/switch to improvement branch
        if: steps.killswitch.outputs.disabled != 'true'
        run: |
          git fetch origin vision-improvements 2>/dev/null || true
          git checkout vision-improvements 2>/dev/null || git checkout -b vision-improvements
          git merge main --no-edit || true

      - name: Run improvement agent
        if: steps.killswitch.outputs.disabled != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "::warning::ANTHROPIC_API_KEY secret not set — skipping agent run"
            exit 0
          fi
          python3 -c "
          import anthropic, pathlib
          prompt = pathlib.Path('.github/vision-agent/PROMPT.md').read_text()
          pricing = pathlib.Path('src/enhanced-pricing.js').read_text()
          client = anthropic.Anthropic()
          msg = client.messages.create(
              model='claude-sonnet-4-20250514',
              max_tokens=2048,
              messages=[{'role':'user','content': prompt + '\n\nCurrent file:\n\`\`\`js\n' + pricing + '\n\`\`\`'}]
          )
          print(msg.content[0].text)
          "

      - name: Run tests
        if: steps.killswitch.outputs.disabled != 'true'
        run: |
          python3 -m pytest tests/test_watch_recognition.py -v --tb=short || true
          npx vitest run tests/js/worker.test.js || true

      - name: Commit and push if changes exist
        if: steps.killswitch.outputs.disabled != 'true'
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "No changes — nothing to commit."
            exit 0
          fi
          git config user.name "vision-agent"
          git config user.email "vision-agent@users.noreply.github.com"
          git add -A
          TS=$(date -u +"%Y-%m-%dT%H:%MZ")
          git commit -m "vision(auto): improvement cycle — ${TS}

          Automated by .github/workflows/hourly-vision-improve.yml"
          for i in 1 2 3; do
            if git push -u origin vision-improvements; then exit 0; fi
            echo "push retry $i..."
            sleep $i
          done
          exit 1
