name: Hourly audit

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

concurrency:
  group: hourly-audit
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  audit:
    name: Run audit + commit report
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 10

      - name: Kill switch check
        id: killswitch
        run: |
          if [ -f .github/audit/DISABLED ]; then
            echo "disabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "disabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.killswitch.outputs.disabled != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        if: steps.killswitch.outputs.disabled != 'true'
        run: pip install pytest jsonschema

      - name: Set up Node
        if: steps.killswitch.outputs.disabled != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Node deps
        if: steps.killswitch.outputs.disabled != 'true'
        run: npm install || echo "npm install failed, continuing without node deps"

      - name: Run audit
        if: steps.killswitch.outputs.disabled != 'true'
        env:
          DASHBOARD_URL: ${{ vars.DASHBOARD_URL }}
        run: python3 scripts/audit_repo.py

      - name: Commit report changes
        if: steps.killswitch.outputs.disabled != 'true'
        run: |
          if git diff --quiet .github/audit/ 2>/dev/null; then
            echo "No changes — nothing to commit."
            exit 0
          fi
          git config user.name "opulence-audit-bot"
          git config user.email "opulence-audit-bot@users.noreply.github.com"
          git add .github/audit/LATEST.md .github/audit/HISTORY.md 2>/dev/null || true
          OVERALL=$(grep -m1 'Overall' .github/audit/LATEST.md | head -1 || echo "?")
          TS=$(date -u +"%Y-%m-%dT%H:%MZ")
          git commit -m "audit: ${TS}" || exit 0
          for i in 1 2 3; do
            if git push; then exit 0; fi
            sleep $i
          done
          exit 1
