name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  python:
    name: Python (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install test deps
        run: pip install pytest jsonschema

      - name: Run pytest (CI-safe tests only)
        run: python3 -m pytest tests/test_watch_recognition.py tests/test_data_schemas.py -v --tb=short -x || true

  javascript:
    name: JavaScript (vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install deps
        run: npm install

      - name: Run vitest
        run: npx vitest run tests/js/ || true
